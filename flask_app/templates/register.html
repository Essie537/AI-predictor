{% extends "base.html" %}

{% block content %}

<div class="container py-5">

<div class="row justify-content-center align-items-center">

<div class="col-lg-5">

<div class="login-card">

<h2 class="text-center mb-4">

📝 Create Account

</h2>

{% if error %}

<div class="alert alert-danger">

{{ error }}

</div>

{% endif %}

<form method="POST">

<div class="mb-3">

<label>Full Name</label>

<input
type="text"
name="fullname"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Email</label>

<input
type="email"
name="email"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Username</label>

<input
type="text"
name="username"
class="form-control"
required>

</div>

<div class="mb-4">

<label>Password</label>

<input
type="password"
name="password"
class="form-control"
required>

</div>

<button
class="btn btn-success w-100">

Create Account

</button>

</form>

<hr>

<p class="text-center">

Already have an account?

<a href="/login">

Login

</a>

</p>

</div>

</div>

<div class="col-lg-6 text-center">

<img
src="https://cdn-icons-png.flaticon.com/512/4202/4202843.png"
class="img-fluid"
style="max-width:420px;">

</div>

</div>

</div>

{% endblock %}
